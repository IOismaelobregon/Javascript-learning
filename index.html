<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Contador - Aprendiendo JavaScript</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🔢 Mi Primer Contador en JavaScript</h1>
        
        <div class="contador-box">
            <p id="numero">0</p>
            <p class="etiqueta">El número actual es:</p>
        </div>

        <div class="botones">
            <button id="btnRestar" class="btn btn-restar">➖ Restar</button>
            <button id="btnSumar" class="btn btn-sumar">➕ Sumar</button>
        </div>

        <button id="btnReiniciar" class="btn btn-reiniciar">🔄 Reiniciar</button>

        <div class="info">
            <p>👉 Haz click en los botones para sumar o restar</p>
            <p>📊 Cada click cambia el número automáticamente</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
